<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Ledger Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --income: #22c55e;
            --expense: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }

        /* 侧边导航 */
        nav {
            width: 80px;
            background: rgba(15, 23, 42, 0.8);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 40px;
        }
        .nav-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; color: var(--text-dim); }
        .nav-icon.active { background: var(--accent); color: white; box-shadow: 0 0 15px var(--accent); }

        /* 主体内容 */
        main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        header { margin-bottom: 40px; }
        header h1 { font-size: 24px; font-weight: 600; }
        header p { color: var(--text-dim); font-size: 14px; margin-top: 5px; }

        /* 概览卡片 */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); padding: 25px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card span { color: var(--text-dim); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card h2 { font-size: 28px; margin-top: 10px; }

        /* 输入区 */
        .input-panel { background: var(--card-bg); padding: 25px; border-radius: 16px; margin-bottom: 30px; display: flex; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .input-group label { font-size: 12px; color: var(--text-dim); }
        input, select { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        .btn-add { background: var(--accent); color: #0f172a; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 600; cursor: pointer; height: 43px; }

        /* 列表展示 */
        .list-container { background: var(--card-bg); border-radius: 16px; overflow: hidden; }
        .list-header { padding: 20px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; }
        .item { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item:hover { background: rgba(255,255,255,0.02); }
        .item-info h4 { font-size: 15px; margin-bottom: 4px; }
        .item-info p { font-size: 12px; color: var(--text-dim); }
        .item-amount { font-weight: 600; font-size: 16px; }
        .income-val { color: var(--income); }
        .expense-val { color: var(--expense); }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav { width: 100%; height: 60px; flex-direction: row; justify-content: center; order: 2; position: fixed; bottom: 0; z-index: 100; }
            main { padding: 20px; padding-bottom: 80px; }
            .input-panel { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-icon active">📊</div>
    <div class="nav-icon">📅</div>
    <div class="nav-icon">⚙️</div>
</nav>

<main>
    <header>
        <h1>资产概览</h1>
        <p id="date-now">Dashboard / Transaction Overview</p>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <span>今日收入</span>
            <h2 id="total-inc" class="income-val">¥ 0.00</h2>
        </div>
        <div class="stat-card">
            <span>今日支出</span>
            <h2 id="total-exp" class="expense-val">¥ 0.00</h2>
        </div>
        <div class="stat-card">
            <span>存储状态</span>
            <h2 style="font-size: 18px; color: var(--accent);">Bucket: money ✅</h2>
        </div>
    </div>

    <div class="input-panel">
        <div class="input-group" style="flex: 0.5;">
            <label>类型</label>
            <select id="type">
                <option value="expense">支出</option>
                <option value="income">收入</option>
            </select>
        </div>
        <div class="input-group">
            <label>金额</label>
            <input type="number" id="amount" placeholder="0.00">
        </div>
        <div class="input-group" style="flex: 2;">
            <label>备注</label>
            <input type="text" id="desc" placeholder="请输入交易说明...">
        </div>
        <button class="btn-add" onclick="saveRecord()">入账</button>
    </div>

    <div class="list-container">
        <div class="list-header">最近交易</div>
        <div id="records-list">
            </div>
    </div>
</main>

<script>
    // 你的 Supabase 配置
    const SB_URL = "https://gzhsvctnisnoimiddoia.supabase.co";
    const SB_KEY = "sb_publishable_Gs2YXmsg_2RRgyuVABP9Ww_1zbSjw5N"; 
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    async function loadRecords() {
        const { data, error } = await supabase
            .from('money_records')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);
        render(data);
    }

    async function saveRecord() {
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const desc = document.getElementById('desc').value;

        if (!amount) return;

        const { error } = await supabase
            .from('money_records')
            .insert([{ amount: parseFloat(amount), type, description: desc }]);

        if (error) alert("保存失败");
        else {
            document.getElementById('amount').value = '';
            document.getElementById('desc').value = '';
            loadRecords();
        }
    }

    function render(data) {
        const list = document.getElementById('records-list');
        let inc = 0, exp = 0;
        
        list.innerHTML = data.length ? '' : '<p style="padding:40px; text-align:center; color:var(--text-dim)">暂无交易记录</p>';
        
        data.forEach(item => {
            if(item.type === 'income') inc += item.amount;
            else exp += item.amount;

            const date = new Date(item.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            
            list.innerHTML += `
                <div class="item">
                    <div class="item-info">
                        <h4>${item.description || '未命名交易'}</h4>
                        <p>${date} • 云端同步</p>
                    </div>
                    <div class="item-amount ${item.type === 'income' ? 'income-val' : 'expense-val'}">
                        ${item.type === 'income' ? '+' : '-'}${item.amount.toFixed(2)}
                    </div>
                </div>
            `;
        });

        document.getElementById('total-inc').innerText = `¥ ${inc.toFixed(2)}`;
        document.getElementById('total-exp').innerText = `¥ ${exp.toFixed(2)}`;
    }

    document.getElementById('date-now').innerText = new Date().toDateString();
    loadRecords();
</script>
</body>
</html>
