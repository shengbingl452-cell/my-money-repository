<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Ledger Pro v2</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a; --card-bg: #1e293b; --accent: #38bdf8;
            --text-main: #f8fafc; --text-dim: #94a3b8; --income: #22c55e; --expense: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; min-height: 100vh; }
        nav { width: 80px; background: rgba(15, 23, 42, 0.8); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; padding: 30px 0; gap: 40px; }
        .nav-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--card-bg); display: flex; align-items: center; justify-content: center; color: var(--text-dim); }
        main { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
        
        /* 核心输入面板重排 */
        .input-panel { background: var(--card-bg); padding: 25px; border-radius: 16px; margin-bottom: 30px; display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; align-items: flex-end; border: 1px solid rgba(255,255,255,0.05); }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        .input-group label { font-size: 12px; color: var(--text-dim); font-weight: 600; }
        input, select { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        .btn-add { background: var(--accent); color: #0f172a; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        .btn-add:hover { opacity: 0.9; transform: translateY(-2px); }

        .list-container { background: var(--card-bg); border-radius: 16px; overflow: hidden; }
        .item { padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .currency-badge { font-size: 10px; background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; margin-left: 8px; }
    </style>
</head>
<body>

<nav><div class="nav-icon" style="background:var(--accent); color:white;">💰</div></nav>

<main>
    <header style="margin-bottom: 30px;">
        <h1>记账中心</h1>
        <p style="color:var(--text-dim)">Cloud Ledger / Multi-Currency Support</p>
    </header>

    <div class="input-panel">
        <div class="input-group">
            <label>交易类型</label>
            <select id="type">
                <option value="expense">支出 (-)</option>
                <option value="income">收入 (+)</option>
            </select>
        </div>
        <div class="input-group">
            <label>选择币种</label>
            <select id="currency">
                <option value="CNY">人民币 (¥)</option>
                <option value="USD">美元 ($)</option>
                <option value="EUR">欧元 (€)</option>
                <option value="JPY">日元 (¥)</option>
            </select>
        </div>
        <div class="input-group">
            <label>金额</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
            <label>交易日期</label>
            <input type="date" id="trans-date">
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>备注说明</label>
            <input type="text" id="desc" placeholder="比如：午饭、工资、买显卡...">
        </div>
        <button class="btn-add" onclick="saveRecord()">提交入账</button>
    </div>

    <div class="list-container">
        <div style="padding:20px; font-weight:600; border-bottom:1px solid rgba(255,255,255,0.1)">历史记录</div>
        <div id="records-list"></div>
    </div>
</main>

<script>
    // 你的核心配置
    const SB_URL = "https://gzhsvctnisnoimiddoia.supabase.co";
    const SB_KEY = "sb_publishable_Gs2YXmsg_2RRgyuVABP9Ww_1zbSjw5N"; 
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    // 设置默认日期为今天
    document.getElementById('trans-date').valueAsDate = new Date();

    async function saveRecord() {
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const currency = document.getElementById('currency').value;
        const date = document.getElementById('trans-date').value;
        const desc = document.getElementById('desc').value;

        if (!amount) return alert("没填金额啊大哥！");

        const { error } = await supabase.from('money_records').insert([{
            amount: parseFloat(amount),
            type: type,
            currency: currency,
            transaction_date: date, // 存储用户选择的日期
            description: desc
        }]);

        if (!error) {
            alert("✅ 入账成功");
            document.getElementById('amount').value = '';
            document.getElementById('desc').value = '';
            loadRecords();
        } else {
            console.error(error);
            alert("失败了，检查下表结构字段对不对。");
        }
    }

    async function loadRecords() {
        const { data, error } = await supabase
            .from('money_records')
            .select('*')
            .order('transaction_date', { ascending: false });

        if (error) return;
        
        const list = document.getElementById('records-list');
        list.innerHTML = data.map(item => `
            <div class="item">
                <div>
                    <div style="font-size:14px; margin-bottom:4px;">${item.description || '日常收支'}</div>
                    <div style="font-size:11px; color:var(--text-dim)">
                        ${item.transaction_date.split('T')[0]} • <span style="color:var(--accent)">${item.currency}</span>
                    </div>
                </div>
                <div style="font-weight:700; color: ${item.type === 'income' ? 'var(--income)' : 'var(--expense)'}">
                    ${item.type === 'income' ? '+' : '-'}${item.amount.toFixed(2)}
                </div>
            </div>
        `).join('');
    }

    loadRecords();
</script>
</body>
</html>
