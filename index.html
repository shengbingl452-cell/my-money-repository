<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stella OS | Financial Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --hot-pink: #ff85a1;
            --soft-pink: #f8c6d1;
            --retro-blue: #7a7dbd;
            --win-border: #222;
            --bg-dark: #1e293b;
            --pixel-font: "Pixelify Sans", "Courier New", monospace;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: var(--pixel-font) !important;
            -webkit-font-smoothing: none;
        }

        body {
            height: 100vh;
            background: var(--retro-blue);
            background-image: linear-gradient(135deg, rgba(255,133,161,0.4) 0%, transparent 50%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部状态栏 */
        .top-bar {
            height: 28px; background: rgba(255, 255, 255, 0.85);
            border-bottom: 2px solid var(--win-border);
            display: flex; align-items: center; padding: 0 15px; font-size: 14px; z-index: 1000;
        }

        /* 记账窗口核心样式 */
        .window {
            position: absolute; left: 50%; top: 55%; transform: translate(-50%, -50%);
            width: 90%; max-width: 600px; background: #fff;
            border: 3px solid var(--win-border);
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
        }

        .window-header {
            padding: 8px 12px; background: var(--hot-pink); color: white;
            border-bottom: 2px solid var(--win-border);
            display: flex; justify-content: space-between; align-items: center;
        }

        .window-content { padding: 15px; background: #fdf2f5; overflow-y: auto; max-height: 70vh; }

        /* 输入区域布局 */
        .ledger-controls {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            margin-bottom: 15px; background: white; padding: 12px;
            border: 2px solid var(--win-border);
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: var(--win-border); font-weight: bold; }
        
        input, select {
            padding: 8px; border: 2px solid var(--win-border);
            background: #fff; font-size: 14px; outline: none;
        }

        .btn-save {
            grid-column: span 2; background: var(--hot-pink); color: white;
            border: 2px solid var(--win-border); padding: 10px;
            font-weight: bold; cursor: pointer; margin-top: 5px;
            box-shadow: 3px 3px 0px #888;
        }
        .btn-save:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #888; }

        /* 历史记录列表 */
        .history-list { border-top: 2px dashed var(--hot-pink); padding-top: 15px; }
        .item {
            background: white; border: 2px solid var(--win-border);
            padding: 10px; margin-bottom: 8px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .item-info { display: flex; flex-direction: column; }
        .item-date { font-size: 10px; color: #666; }
        .amount-inc { color: #22c55e; font-weight: bold; }
        .amount-exp { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

    <div class="top-bar">
        <span style="margin-right: 15px; font-weight: bold;">Stella OS v2.0</span>
        <span id="clock">--:--</span>
    </div>

    <div class="window">
        <div class="window-header">
            <span>✨ Stella_Ledger.exe</span>
            <div style="cursor: pointer;">[X]</div>
        </div>
        <div class="window-content">
            <div class="ledger-controls">
                <div class="input-group">
                    <label>TYPE</label>
                    <select id="type">
                        <option value="expense">EXPENSE (-)</option>
                        <option value="income">INCOME (+)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>CURRENCY</label>
                    <select id="currency">
                        <option value="CNY">CNY (¥)</option>
                        <option value="USD">USD ($)</option>
                        <option value="EUR">EUR (€)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>AMOUNT</label>
                    <input type="number" id="amount" placeholder="0.00">
                </div>
                <div class="input-group">
                    <label>DATE</label>
                    <input type="date" id="trans-date">
                </div>
                <div class="input-group" style="grid-column: span 2;">
                    <label>DESCRIPTION</label>
                    <input type="text" id="desc" placeholder="What did we spend on?">
                </div>
                <button class="btn-save" onclick="saveRecord()">SAVE TO CLOUD</button>
            </div>

            <div class="history-list" id="records-list">
                <p style="text-align: center; font-size: 12px; color: #888;">Loading archives...</p>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化配置
        const SB_URL = "https://gzhsvctnisnoimiddoia.supabase.co";
        const SB_KEY = "sb_publishable_Gs2YXmsg_2RRgyuVABP9Ww_1zbSjw5N"; 
        
        // 关键：重命名变量避开冲突
        const _client = supabase.createClient(SB_URL, SB_KEY);

        // 2. 初始化页面
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('trans-date').valueAsDate = new Date();
            loadRecords();
            setInterval(updateClock, 1000);
        });

        // 3. 记账逻辑
        async function saveRecord() {
            const amount = document.getElementById('amount').value;
            const type = document.getElementById('type').value;
            const curr = document.getElementById('currency').value;
            const date = document.getElementById('trans-date').value;
            const desc = document.getElementById('desc').value;

            if (!amount) return alert("Hey! Amount is empty! (╯°□°）╯");

            const { error } = await _client.from('money_records').insert([{
                amount: parseFloat(amount),
                type: type,
                currency: curr,
                transaction_date: date,
                description: desc
            }]);

            if (!error) {
                alert("Archive Success! ✨");
                document.getElementById('amount').value = '';
                document.getElementById('desc').value = '';
                loadRecords();
            } else {
                alert("Database Error! Check your SQL fields.");
                console.error(error);
            }
        }

        // 4. 拉取逻辑
        async function loadRecords() {
            const { data, error } = await _client
                .from('money_records')
                .select('*')
                .order('transaction_date', { ascending: false });

            if (error) return console.error(error);

            const list = document.getElementById('records-list');
            if (data.length === 0) {
                list.innerHTML = '<p style="text-align:center; font-size:12px;">No records yet. Start archiving!</p>';
                return;
            }

            list.innerHTML = data.map(item => `
                <div class="item">
                    <div class="item-info">
                        <span style="font-size:13px; font-weight:bold;">${item.description || 'Routine'}</span>
                        <span class="item-date">${item.transaction_date.split('T')[0]} • ${item.currency}</span>
                    </div>
                    <div class="${item.type === 'income' ? 'amount-inc' : 'amount-exp'}">
                        ${item.type === 'income' ? '+' : '-'}${Number(item.amount).toFixed(2)}
                    </div>
                </div>
            `).join('');
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
    </script>
</body>
</html>
