<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Ledger | 极简云账本</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0a; --card: #141414; --accent: #00ff88;
            --text: #ffffff; --dim: #888888; --err: #ff4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; margin-top: 40px; }
        
        /* 概览卡片 */
        .header { margin-bottom: 30px; border-left: 4px solid var(--accent); padding-left: 15px; }
        .header h1 { font-size: 20px; letter-spacing: 1px; }

        /* 输入面板 */
        .panel { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        label { display: block; font-size: 11px; color: var(--dim); margin-bottom: 5px; text-transform: uppercase; }
        input, select { 
            width: 100%; background: #000; border: 1px solid #333; padding: 10px; 
            color: #fff; border-radius: 6px; outline: none; font-size: 14px;
        }
        input:focus { border-color: var(--accent); }
        .full-row { margin-bottom: 15px; }
        
        button { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        /* 列表部分 */
        .list-header { font-size: 12px; color: var(--dim); margin-bottom: 10px; display: flex; justify-content: space-between; }
        .item { 
            background: var(--card); padding: 15px; border-radius: 8px; margin-bottom: 8px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #1a1a1a;
        }
        .item-left div { font-size: 14px; margin-bottom: 2px; }
        .item-left span { font-size: 11px; color: var(--dim); }
        .amt { font-family: "Monaco", monospace; font-weight: bold; }
        .inc { color: var(--accent); }
        .exp { color: var(--err); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>TRANSACTION</h1>
        <p style="font-size:12px; color:var(--dim)" id="top-date">Loading...</p>
    </div>

    <div class="panel">
        <div class="row">
            <div class="input-group">
                <label>Type</label>
                <select id="type">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
            </div>
            <div class="input-group">
                <label>Currency</label>
                <select id="currency">
                    <option value="CNY">CNY (¥)</option>
                    <option value="USD">USD ($)</option>
                    <option value="EUR">EUR (€)</option>
                    <option value="JPY">JPY (¥)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="input-group">
                <label>Amount</label>
                <input type="number" id="amount" placeholder="0.00" step="0.01">
            </div>
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="trans-date">
            </div>
        </div>
        <div class="full-row">
            <label>Note</label>
            <input type="text" id="desc" placeholder="What's this for?">
        </div>
        <button onclick="saveRecord()">RECORD ENTRY</button>
    </div>

    <div class="list-header">
        <span>RECENT ACTIVITY</span>
        <span id="stat-summary">...</span>
    </div>
    <div id="records-list"></div>
</div>

<script>
    // 你的核心配置
    const SB_URL = "https://gzhsvctnisnoimiddoia.supabase.co";
    const SB_KEY = "sb_publishable_Gs2YXmsg_2RRgyuVABP9Ww_1zbSjw5N"; 
    const _db = supabase.createClient(SB_URL, SB_KEY); // 避开变量名冲突

    // 初始化：设置今天日期并加载数据
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('trans-date').valueAsDate = new Date();
        document.getElementById('top-date').innerText = new Date().toDateString().toUpperCase();
        loadRecords();
    });

    async function saveRecord() {
        const amt = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const curr = document.getElementById('currency').value;
        const date = document.getElementById('trans-date').value;
        const desc = document.getElementById('desc').value;

        if (!amt) return alert("Enter amount!");

        const { error } = await _db.from('money_records').insert([{
            amount: parseFloat(amt),
            type: type,
            currency: curr,
            transaction_date: date,
            description: desc
        }]);

        if (!error) {
            document.getElementById('amount').value = '';
            document.getElementById('desc').value = '';
            loadRecords();
        } else {
            alert("Error: Check SQL Fields");
        }
    }

    async function loadRecords() {
        const { data, error } = await _db
            .from('money_records')
            .select('*')
            .order('transaction_date', { ascending: false });

        if (error) return;

        const list = document.getElementById('records-list');
        list.innerHTML = data.map(item => `
            <div class="item">
                <div class="item-left">
                    <div>${item.description || 'General'}</div>
                    <span>${item.transaction_date.split('T')[0]} · ${item.currency}</span>
                </div>
                <div class="amt ${item.type === 'income' ? 'inc' : 'exp'}">
                    ${item.type === 'income' ? '+' : '-'}${Number(item.amount).toFixed(2)}
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
